{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}Catálogo{% endblock %}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand bg-light mb-3">
      <div class="container">
        <a class="navbar-brand" href="/">Catálogo</a>
        <div class="navbar-nav">
          {% if user.is_authenticated %}
            <span class="nav-item nav-link">Hola {{ user.username }}</span>
            <a class="nav-item nav-link" href="/accounts/logout/">Salir</a>
          {% else %}
            <a class="nav-item nav-link" href="/accounts/login/">Entrar</a>
            <a class="nav-item nav-link" href="/accounts/register/">Registro</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
