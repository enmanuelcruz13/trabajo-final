{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <title>{{ pelicula.titulo }}</title>
  </head>
  <body>
    <div class="container mt-4">
      <a href="/" class="btn btn-link">← Volver</a>
      <div class="row">
        <div class="col-md-4">
          {% if pelicula.imagen %}
          <img src="{{ pelicula.imagen }}" class="img-fluid" alt="{{ pelicula.titulo }}">
          {% endif %}
        </div>
        <div class="col-md-8">
          <h1>{{ pelicula.titulo }}</h1>
          <p><strong>Genero:</strong> {{ pelicula.genero }}</p>
          <p>{{ pelicula.descripcion }}</p>
          {% if user.is_authenticated %}
          <a href="{% url 'agregar_favorito' pelicula.pk %}" class="btn btn-outline-primary">Agregar a favoritos</a>
          {% else %}
          <p><a href="/admin/login/?next={{ request.path }}">Inicia sesión</a> para agregar a favoritos.</p>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
