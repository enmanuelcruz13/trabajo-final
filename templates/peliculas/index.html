{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <title>Catalogo</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Catalogo</a>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        {% for p in peliculas %}
        <div class="col-md-4 mb-3">
          <div class="card h-100">
            {% if p.imagen %}
            <img src="{{ p.imagen }}" class="card-img-top" alt="{{ p.titulo }}">
            {% endif %}
            <div class="card-body">
              <h5 class="card-title">{{ p.titulo }}</h5>
              <p class="card-text">{{ p.descripcion|truncatechars:120 }}</p>
              <a href="{% url 'detalle' p.pk %}" class="btn btn-primary">Ver detalles</a>
            </div>
          </div>
        </div>
        {% empty %}
        <p>No hay peliculas disponibles.</p>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
