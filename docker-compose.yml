version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-catalogo_db}
      MYSQL_ROOT_PASSWORD: ""                 # intencionadamente vacío para desarrollo
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'         # permite contraseña vacía (solo dev)
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build: .
    command: bash -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn catalogo.wsgi:application --bind 0.0.0.0:8000 --chdir /app"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-changeme}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-catalogo_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_HOST: db
      MYSQL_PORT: ${MYSQL_PORT:-3306}
    depends_on:
      - db

volumes:
  db_data:

  # additional service for the new Django project (catalogo_new)
