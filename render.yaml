services:
  - type: web
    name: catalogo-peliculas
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn catalogo.asgi:application --host 0.0.0.0 --port $PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: catalogo.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: catalogo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: catalogo-db
    databaseName: catalogo
    plan: free
    postgresMajorVersion: 16
